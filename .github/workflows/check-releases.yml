name: Check New PocketMine-MP Releases & Generate Stubs

on:
  schedule:
    # Corre cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      force_version:
        description: "Forzar generación de stubs para versión específica (ej: 5.42.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  check-releases:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pm_release.outputs.version }}
      needs_generation: ${{ steps.check.outputs.needs_generation }}
      mc_version: ${{ steps.release_details.outputs.mc_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────
      # Setup
      # ────────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      # ────────────────────────────────────────────────────────────
      # Obtener el último release de PocketMine-MP
      # ────────────────────────────────────────────────────────────
      - name: Get latest PocketMine-MP release
        id: pm_release
        run: |
          if [ -n "${{ inputs.force_version }}" ]; then
            LATEST="${{ inputs.force_version }}"
            echo "✓ Usando versión forzada: $LATEST"
          else
            LATEST=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/pmmp/PocketMine-MP/releases/latest \
              | jq -r '.tag_name')
            echo "✓ Último release en GitHub: $LATEST"
          fi
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      # ────────────────────────────────────────────────────────────
      # Verificar si ya existe release de stubs en este repositorio
      # ────────────────────────────────────────────────────────────
      - name: Check if stubs already exist for this version
        id: check
        run: |
          VERSION="${{ steps.pm_release.outputs.version }}"

          # Verificar si existe release con tag de la versión
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$RELEASE_URL")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "needs_generation=false" >> $GITHUB_OUTPUT
            echo "✓ Stubs para $VERSION ya existen en este repositorio"
          else
            echo "needs_generation=true" >> $GITHUB_OUTPUT
            echo "⚠ Stubs para $VERSION NO existen - se generarán"
          fi

      # ────────────────────────────────────────────────────────────
      # Obtener detalles del release (Minecraft version)
      # ────────────────────────────────────────────────────────────
      - name: Get release details from PMMP
        id: release_details
        if: steps.check.outputs.needs_generation == 'true'
        run: |
          VERSION="${{ steps.pm_release.outputs.version }}"
          RELEASE_DATA=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/pmmp/PocketMine-MP/releases/tags/$VERSION")

          BODY=$(echo "$RELEASE_DATA" | jq -r '.body // ""')

          # Intentar extraer versión de Minecraft del body del release
          MC_VERSION=$(echo "$BODY" | grep -oP 'Bedrock[^0-9]*\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "unknown")

          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT
          echo "✓ MC Version: $MC_VERSION"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Generar stubs automáticamente
  # ─────────────────────────────────────────────────────────────────────────────
  generate-stubs:
    needs: check-releases
    if: needs.check-releases.outputs.needs_generation == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: |
            generator/workdir/pocketmine_phar
            generator/workdir/phpstorm_stubs_fork
          key: stubs-downloads-${{ needs.check-releases.outputs.version }}
          restore-keys: |
            stubs-downloads-

      - name: Generate stubs
        id: generate
        run: |
          VERSION="${{ needs.check-releases.outputs.version }}"
          echo "🚀 Generando stubs para $VERSION..."

          # Capturar la salida completa
          FULL_OUTPUT=$(python3 generator/generate.py \
            --version="$VERSION" \
            --workdir="generator/workdir" \
            --output="generator/output" \
            --clean 2>&1)

          # Extraer la última línea (que debe ser el SHA256)
          SHA256=$(echo "$FULL_OUTPUT" | tail -1)

          # Validar que sea un hash SHA256 válido (64 caracteres hex)
          if ! [[ $SHA256 =~ ^[a-f0-9]{64}$ ]]; then
            echo "❌ SHA256 inválido: $SHA256"
            echo "Salida completa:"
            echo "$FULL_OUTPUT"
            exit 1
          fi

          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "✅ Stubs generados - SHA256: $SHA256"

      - name: Verify generated files
        run: |
          VERSION="${{ needs.check-releases.outputs.version }}"
          ZIP="generator/output/stubs-${VERSION}.zip"
          STATS="generator/output/stats-${VERSION}.json"

          if [ ! -f "$ZIP" ]; then
            echo "❌ ZIP no encontrado: $ZIP"
            exit 1
          fi

          if [ ! -f "$STATS" ]; then
            echo "❌ Stats no encontrado: $STATS"
            exit 1
          fi

          SIZE=$(du -sh "$ZIP" | cut -f1)
          echo "✅ ZIP verificado: $SIZE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stubs-${{ needs.check-releases.outputs.version }}
          path: |
            generator/output/stubs-*.zip
            generator/output/stats-*.json
          retention-days: 5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-releases.outputs.version }}
          name: "Stubs PocketMine-MP ${{ needs.check-releases.outputs.version }}"
          files: |
            generator/output/stubs-${{ needs.check-releases.outputs.version }}.zip
            generator/output/stats-${{ needs.check-releases.outputs.version }}.json
          body: |
            ## 📦 Stubs para PocketMine-MP ${{ needs.check-releases.outputs.version }}

            Generados automáticamente por GitHub Actions.
            Listos para usar con **Intelephense** en [PocketIDE](https://github.com/pocketide/pocketide).

            ### 📋 Información

            | Campo | Valor |
            |-------|-------|
            | **Versión PM** | `${{ needs.check-releases.outputs.version }}` |
            | **Versión MC** | `${{ needs.check-releases.outputs.mc_version }}` |
            | **SHA256** | `${{ steps.generate.outputs.sha256 }}` |

            ### 🔐 Checksum SHA256

            ```
            ${{ steps.generate.outputs.sha256 }}
            ```

            Usa este valor en [pocketide/pocketmine-manifest](https://github.com/pocketide/pocketmine-manifest) para actualizar el manifest.

            ### 📊 Contenido

            Ver `stats-${{ needs.check-releases.outputs.version }}.json` para detalles completos.

            ---

            *Generado por: Check New PocketMine-MP Releases*

      - name: Print summary
        run: |
          echo "📊 === GENERATION SUMMARY ==="
          echo "Version: ${{ needs.check-releases.outputs.version }}"
          echo "MC Version: ${{ needs.check-releases.outputs.mc_version }}"
          echo "SHA256: ${{ steps.generate.outputs.sha256 }}"
          echo ""
          echo "✅ Release created successfully!"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.check-releases.outputs.version }}"
